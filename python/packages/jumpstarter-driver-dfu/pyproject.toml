[project]
name = "jumpstarter-driver-dfu"
dynamic = ["version", "urls"]
description = "DFU (dfu-util) driver for Jumpstarter"
readme = "README.md"
license = "Apache-2.0"
authors = [
    { name = "Alexandre Bailon", email = "abailon@baylibre.com" }
]
requires-python = ">=3.11"
dependencies = [
    "anyio>=4.10.0",
    "click>=8.1.7.2",
    "jumpstarter",
    "jumpstarter-driver-opendal",
]

[project.entry-points."jumpstarter.drivers"]
Dfu = "jumpstarter_driver_dfu.driver:Dfu"

[tool.hatch.version]
source = "vcs"
raw-options = { 'root' = '../../../'}

[tool.hatch.metadata.hooks.vcs.urls]
Homepage = "https://jumpstarter.dev"
source_archive = "https://github.com/jumpstarter-dev/repo/archive/{commit_hash}.zip"

[tool.pytest.ini_options]
addopts = "--cov --cov-report=html --cov-report=xml"
log_cli = true
log_cli_level = "INFO"
testpaths = ["jumpstarter_driver_dfu"]
asyncio_mode = "auto"

[build-system]
requires = ["hatchling", "hatch-vcs", "hatch-pin-jumpstarter"]
build-backend = "hatchling.build"

[tool.hatch.build.hooks.pin_jumpstarter]
name = "pin_jumpstarter"

[dependency-groups]
dev = [
    "pytest-cov>=6.0.0",
    "pytest>=8.3.3",
]
