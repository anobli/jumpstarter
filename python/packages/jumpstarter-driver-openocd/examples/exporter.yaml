apiVersion: jumpstarter.dev/v1alpha1
kind: ExporterConfig
metadata:
  namespace: default
  name: demo
endpoint: grpc.jumpstarter.192.168.0.203.nip.io:8082
token: "<token>"
export:
  flasher:
    type: jumpstarter_driver_openocd.driver.OpenOCD
    config:
      # Path to the openocd binary on the exporter.
      command_openocd: openocd
      # -s paths prepended to every invocation. Typically the openocd
      # distribution's own scripts dir; do NOT point at a Zephyr tree
      # — the client uploads board-specific configs in the bundle.
      search_dirs:
        - /usr/share/openocd/scripts
