apiVersion: jumpstarter.dev/v1alpha1
kind: ExporterConfig
metadata:
  namespace: default
  name: demo
endpoint: grpc.jumpstarter.192.168.0.203.nip.io:8082
token: "<token>"
export:
  fastboot:
    type: jumpstarter_driver_fastboot.driver.Fastboot
    config:
      # Optional: pin to one DUT on a multi-DUT exporter.
      # serial: "1234567890"   # device serial or fastboot USB path

      # Optional: exporter-local images. When `flash()` is called
      # without a file, the path for the partition is looked up here.
      # partitions:
      #   bootloader: /var/lib/jumpstarter/firmware/bootloader.img
      #   boot:       /var/lib/jumpstarter/firmware/boot.img
      #   super:      /var/lib/jumpstarter/firmware/super.img

      # fastboot_path: /usr/local/bin/fastboot
