[project]
name = "jumpstarter-driver-zephyr"
dynamic = ["version", "urls"]
description = "Flash Zephyr firmware on a remote exporter (server-side twister flash command)"
readme = "README.md"
license = "Apache-2.0"
authors = [
    { name = "Alexandre Bailon", email = "abailon@baylibre.com" }
]
requires-python = ">=3.11"
dependencies = [
    "anyio>=4.10.0",
    "click>=8.1.7.2",
    "jumpstarter",
    "jumpstarter-driver-pyserial",
]

[project.entry-points."jumpstarter.drivers"]
Zephyr = "jumpstarter_driver_zephyr.driver:Zephyr"

[tool.hatch.version]
source = "vcs"
raw-options = { 'root' = '../../../'}

[tool.hatch.metadata.hooks.vcs.urls]
Homepage = "https://jumpstarter.dev"
source_archive = "https://github.com/jumpstarter-dev/repo/archive/{commit_hash}.zip"

[tool.pytest.ini_options]
addopts = "--cov --cov-report=html --cov-report=xml"
log_cli = true
log_cli_level = "INFO"
testpaths = ["jumpstarter_driver_zephyr"]
asyncio_mode = "auto"

[build-system]
requires = ["hatchling", "hatch-vcs", "hatch-pin-jumpstarter"]
build-backend = "hatchling.build"

[tool.hatch.build.hooks.pin_jumpstarter]
name = "pin_jumpstarter"

[dependency-groups]
dev = [
    "pytest-cov>=6.0.0",
    "pytest>=8.3.3",
]

# The flash wrapper is loaded at runtime from the installed package directory
# (ZephyrClient._flash_command), so it must ship inside the wheel.
[tool.hatch.build.targets.wheel.force-include]
"jumpstarter_driver_zephyr/jmp_flash_wrapper.sh" = "jumpstarter_driver_zephyr/jmp_flash_wrapper.sh"
